{% extends "base.html" %}

{% block content %}
<h2>Welcome, {{ username }}!</h2>
<p class="center">You are logged in securely.</p>

<div class="center">
    <a href="{{ url_for('profile') }}" style="text-decoration: none;">
        <button type="button">Go to Profile</button>
    </a>
</div>

<div class="center">
    <a href="{{ url_for('logout') }}" style="text-decoration: none;">
        <button type="button">Logout</button>
    </a>
</div>
{% endblock %}
